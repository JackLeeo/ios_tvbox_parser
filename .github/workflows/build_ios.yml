name: Build iOS IPA (TrollStore / 未签名)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 安装 CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install --repo-update && cd ..
      - name: 强制禁用 Xcode 代码签名
        run: |
          # 进入 ios 目录
          cd ios
          
          # 使用 sed 命令修改 project.pbxproj 文件，将所有签名相关的设置置空
          # 这会将 CODE_SIGN_IDENTITY 设置为空
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          # 这会将 DEVELOPMENT_TEAM 设置为空
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          # 这会将 PROVISIONING_PROFILE_SPECIFIER 设置为空
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*"/PROVISIONING_PROFILE_SPECIFIER = ""/g' Runner.xcodeproj/project.pbxproj
          
          # 设置 CODE_SIGNING_ALLOWED 为 NO
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' Runner.xcodeproj/project.pbxproj
          
          echo "✅ Xcode 签名设置已强制禁用"
          cd ..
      - name: 构建 iOS .app (无签名)
        run: |
          flutter build ios --release --no-codesign

      - name: 修复二进制路径并打包 IPA
        run: |
          APP_PATH="./build/ios/iphoneos/Runner.app"
          
          # 赋予执行权限
          chmod +x "$APP_PATH/Runner"
          
          # 🔥 关键步骤：强制指定二进制文件名为 Runner
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Runner" "$APP_PATH/Info.plist"
          
          # 打包
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r tvbox.ipa Payload
          echo "✅ IPA 已生成，大小为:"
          ls -lh tvbox.ipa

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: ios_tvbox_parser-unsigned
          path: tvbox.ipa
          retention-days: 30
