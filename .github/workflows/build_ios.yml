name: Build iOS IPA (TrollStore / 未签名)

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 安装 CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install --repo-update && cd ..

      - name: 构建 iOS .app (无签名)
        run: |
          flutter build ios --release --no-codesign

      - name: 打包成 IPA
        run: |
          APP_PATH="./build/ios/iphoneos/Runner.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r tvbox.ipa Payload
          ls -lh tvbox.ipa

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: ios_tvbox_parser-unsigned
          path: tvbox.ipa
          retention-days: 30
