name: Build iOS IPA (TrollStore / 无签名)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 安装 Flutter 依赖
        run: flutter pub get

      - name: 安装 CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install --repo-update && cd ..

      - name: 🛠️ 使用 xcodebuild 强制禁用签名并构建
        run: |
          cd ios
          
          # 清理之前的构建产物
          rm -rf build
          
          # 获取 Flutter 生成的 Xcode 环境变量
          flutter build ios --release --no-codesign --verbose 2>&1 | grep "xcodebuild" | head -1 || true
          
          # 直接用 xcodebuild 构建，并强制注入签名禁用标志
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            archive
            
          # 从 archive 中导出 .app
          mkdir -p ../build/ios/iphoneos
          cp -R ./build/Runner.xcarchive/Products/Applications/Runner.app ../build/ios/iphoneos/
          
          echo "✅ xcodebuild 构建完成"
          cd ..

      - name: 修复二进制权限并打包 IPA
        run: |
          APP_PATH="./build/ios/iphoneos/Runner.app"
          
          # 确保 Runner 有执行权限
          chmod +x "$APP_PATH/Runner"
          
          # 修正 Info.plist 中的 CFBundleExecutable
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Runner" "$APP_PATH/Info.plist"
          
          # 打包成 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r tvbox.ipa Payload
          
          echo "✅ IPA 已生成，大小为:"
          ls -lh tvbox.ipa

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: ios_tvbox_parser-unsigned
          path: tvbox.ipa
          retention-days: 30
