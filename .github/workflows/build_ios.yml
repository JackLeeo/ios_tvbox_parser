name: Build iOS IPA (TrollStore / 无签名)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 安装 Flutter 依赖
        run: flutter pub get
      - name: Download and setup NodeMobile.xcframework for iOS
        run: |
          echo "=== 下载 NodeMobile.xcframework ==="
          mkdir -p ios/Frameworks
          cd ios/Frameworks
          curl -L -o nodejs-mobile.zip https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v18.20.4/nodejs-mobile-v18.20.4-ios.zip
          unzip -o -q nodejs-mobile.zip
          rm nodejs-mobile.zip
          
          # 确保 .xcframework 存在
          if [ ! -d "NodeMobile.xcframework" ]; then
            echo "❌ NodeMobile.xcframework 未找到"
            echo "当前目录内容："
            ls -la
            exit 1
          fi
          
          echo "✅ NodeMobile.xcframework 下载完成，位于 $(pwd)/NodeMobile.xcframework"
          cd ../..

      - name: Embed NodeMobile.xcframework in Xcode project
        run: |
          cd ios
          # 获取框架的绝对路径（在 Ruby 中使用 ENV 传入）
          export FRAMEWORK_ABSOLUTE_PATH="$(pwd)/Frameworks/NodeMobile.xcframework"
          ruby <<-'EOF'
          require 'xcodeproj'
          project_path = 'Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          runner_target = project.targets.find { |t| t.name == 'Runner' }
          
          # 使用绝对路径创建文件引用
          framework_path = ENV['FRAMEWORK_ABSOLUTE_PATH']
          framework_ref = project.main_group.new_reference(framework_path)
          
          # 可选：将引用放入 Frameworks 组
          frameworks_group = project.main_group.groups.find { |g| g.name == 'Frameworks' } || project.main_group.new_group('Frameworks')
          framework_ref.move(frameworks_group) unless framework_ref.parent == frameworks_group
          
          # 添加到 "Link Binary With Libraries"
          runner_target.frameworks_build_phase.add_file_reference(framework_ref)
          
          # 添加到 "Embed Frameworks"（确保动态库被打包）
          embed_phase = runner_target.copy_files_build_phases.find { |p| p.dst_subfolder_spec == '10' }
          unless embed_phase
            embed_phase = runner_target.new_copy_files_build_phase('Embed Frameworks')
            embed_phase.dst_subfolder_spec = '10'
          end
          embed_phase.add_file_reference(framework_ref)
          
          project.save
          puts "✅ 已将 NodeMobile.xcframework 添加到 Xcode 项目"
          EOF
          cd ..
      - name: Add NodeJsBridge.swift to Xcode project
        run: |
          cd ios
          ruby <<-'EOF'
          require 'xcodeproj'
          project = Xcodeproj::Project.open('Runner.xcodeproj')
          runner_target = project.targets.find { |t| t.name == 'Runner' }
          runner_group = project.main_group.groups.find { |g| g.name == 'Runner' || g.path == 'Runner' }
          
          # 确保文件引用存在
          file_ref = runner_group.files.find { |f| f.path == 'NodeJsBridge.swift' }
          unless file_ref
            file_ref = runner_group.new_file('NodeJsBridge.swift')
            runner_target.source_build_phase.add_file_reference(file_ref)
          end
          
          project.save
          puts "✅ NodeJsBridge.swift 已添加到 Xcode 项目"
          EOF
          cd ..
      - name: 安装 CocoaPods
        run: |
          gem install cocoapods
          cd ios && pod install --repo-update && cd ..

      - name: 🔧 修改项目文件彻底禁用签名
        run: |
          cd ios
          
          # 修改 project.pbxproj 强制清空签名设置
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*"/PROVISIONING_PROFILE_SPECIFIER = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' Runner.xcodeproj/project.pbxproj
          
          # 确保 Debug/Release 配置也包含签名禁用设置（追加到每个配置块）
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('Runner.xcodeproj')
            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['DEVELOPMENT_TEAM'] = ''
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
              end
            end
            project.save
          " || true
          
          echo "✅ 项目签名设置已强制清空"
          cd ..

      - name: 📱 使用 xcodebuild 构建真机 Release 包
        run: |
          cd ios
          
          # 清理旧产物
          rm -rf build
          
          # 用 xcodebuild 直接构建，完全绕过 Flutter 工具
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/Runner.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            ENABLE_BITCODE=NO \
            archive
          
          # 从 archive 中导出 .app
          mkdir -p ../build/ios/iphoneos
          cp -R ./build/Runner.xcarchive/Products/Applications/Runner.app ../build/ios/iphoneos/
          
          echo "✅ xcodebuild 构建完成"
          cd ..

      - name: 🔧 修复二进制权限并打包 IPA
        run: |
          APP_PATH="./build/ios/iphoneos/Runner.app"
          
          # 确保 Runner 有执行权限
          chmod +x "$APP_PATH/Runner"
          
          # 修正 Info.plist 中的 CFBundleExecutable
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable Runner" "$APP_PATH/Info.plist"
          
          # 移除可能残留的签名相关目录（确保干净）
          rm -rf "$APP_PATH/_CodeSignature" 2>/dev/null || true
          
          # 打包成 IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r tvbox.ipa Payload
          
          echo "✅ IPA 已生成，大小为:"
          ls -lh tvbox.ipa

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: ios_tvbox_parser-unsigned
          path: tvbox.ipa
          retention-days: 30
