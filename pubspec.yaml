name: my_tvbox
description: 个人专属TVBox
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_spinkit: ^5.2.0
  video_player: ^2.8.0
  chewie: ^1.7.0
  webview_flutter: ^4.7.0   # 用于解析部分需要交互的站点
  html: ^0.15.4
  crypto: ^3.0.3
  url_launcher: ^6.2.0
  node_flutter: ^0.0.4  # 注意：这是一个基于 nodejs-mobile 的 Flutter 插件

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - nodejs-project/
